# Production Environment Configuration
# HTTP Listener Configuration
http.host=0.0.0.0
http.port=8080

# Switchee API Configuration - Production
switchee.api.host=api.switchee.co
switchee.api.port=443
switchee.api.protocol=HTTPS
switchee.api.username=${secure::switchee.api.username}
switchee.api.password=${secure::switchee.api.password}
switchee.api.base.path=/v3.0

# Switchee Auth API Configuration - Production
switchee.auth.api.host=api-auth.switchee.co
switchee.auth.api.port=443
switchee.auth.api.protocol=HTTPS
switchee.auth.api.token.path=/oauth2/token

# Switchee Insights API Configuration - Production
switchee.insights.api.host=api.switchee.co
switchee.insights.api.port=443
switchee.insights.api.protocol=HTTPS
switchee.insights.api.key=${secure::switchee.insights.api.key}
switchee.insights.api.version=v3.0

# Switchee Authentication - Production
switchee.oauth.client.credentials=${secure::switchee.oauth.client.credentials}
switchee.oauth.grant.type=client_credentials
switchee.oauth.scope=https://api.switchee.co/api.client

# Salesforce Configuration - Production
salesforce.url=https://login.salesforce.com/services/Soap/u/61.0
salesforce.username=${secure::salesforce.username}
salesforce.password=${secure::salesforce.password}

# Salesforce Data Cloud Configuration - Production
salesforce.data.cloud.consumer.key=${secure::salesforce.data.cloud.consumer.key}
salesforce.data.cloud.keystore.path=/opt/app/resources/keystore.jks
salesforce.data.cloud.store.password=${secure::salesforce.data.cloud.store.password}
salesforce.data.cloud.key.alias=production-key-alias
salesforce.data.cloud.subject=${secure::salesforce.data.cloud.subject}
salesforce.data.cloud.audience.url=https://login.salesforce.com
salesforce.data.cloud.source.name=Switchee_property_insight
salesforce.data.cloud.object.name=Switchee_Property_Insight

# Business Configuration - Production
property.id=${secure::property.id}
asset.id=${secure::asset.id}

# Scheduling Configuration - Production
scheduler.single.property.frequency=1
scheduler.d360.sync.frequency=1

# Content Types
content.type.form.urlencoded=application/x-www-form-urlencoded
content.type.json=application/json